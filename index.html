<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя картинка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000; /* чёрный фон, чтобы было видно границы */
        }
        
        img {
            width: 100%;        /* растягиваем на всю ширину */
            height: auto;       /* высота подстраивается пропорционально */
            display: block;     /* убирает лишние отступы снизу */
        }
    </style>
</head>
<body>
    <img alt="creebet.png" 
         src="https://github.com/artemusheek/a/blob/main/creebet.png?raw=true">
</body>
</html>
