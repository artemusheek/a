<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Дерево — нарисовано через Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #c8e8ff 0%, #a0d0f0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            padding: 20px;
        }

        .container {
            background: #7cb56e;
            background-image: radial-gradient(circle at 25% 40%, rgba(100, 140, 70, 0.3) 2%, transparent 2.5%);
            background-size: 40px 40px;
            border-radius: 48px;
            padding: 30px 40px 40px 40px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.3), inset 0 1px 4px rgba(255, 255, 200, 0.6);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3), inset 0 0 0 2px rgba(255, 255, 200, 0.3);
            cursor: pointer;
            transition: transform 0.2s ease;
            background: #e6f7e6;
        }

        canvas:hover {
            transform: scale(1.02);
        }

        .caption {
            text-align: center;
            margin-top: 24px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #2d3e2b;
            text-shadow: 0 1px 2px rgba(255, 245, 200, 0.8);
            background: rgba(245, 255, 210, 0.7);
            display: inline-block;
            width: auto;
            padding: 8px 24px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            letter-spacing: 1px;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #2c4a1e;
            opacity: 0.8;
        }
    </style>
</head>
<body>
<div>
    <div class="container">
        <canvas id="treeCanvas" width="500" height="600" style="width:500px; height:600px;"></canvas>
        <div class="caption">🌳  ДУБ НА ПОЛЯНЕ  🌳</div>
        <footer>🍃 нарисовано кистью Canvas | живая природа в пикселях</footer>
    </div>
</div>

<script>
    (function drawBeautifulTree() {
        const canvas = document.getElementById('treeCanvas');
        const ctx = canvas.getContext('2d');

        // размеры холста
        const w = 500, h = 600;
        canvas.width = w;
        canvas.height = h;

        // ----- 1. НЕБО И ТРАВА (фон) -----
        // нежный градиент неба
        const skyGrad = ctx.createLinearGradient(0, 0, 0, h * 0.55);
        skyGrad.addColorStop(0, '#d4eefe');
        skyGrad.addColorStop(0.7, '#f0f9e8');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, w, h);

        // земля / травяной покров
        ctx.fillStyle = '#6c9e4a';
        ctx.beginPath();
        ctx.rect(0, h * 0.62, w, h * 0.38);
        ctx.fill();
        // травянистые мазки
        ctx.fillStyle = '#7fb15a';
        for (let i = 0; i < 180; i++) {
            ctx.beginPath();
            const x = Math.random() * w;
            const y = h * 0.6 + Math.random() * (h * 0.35);
            ctx.ellipse(x, y, 3 + Math.random() * 8, 1.5 + Math.random() * 4, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        // светлые травинки
        ctx.fillStyle = '#c0e08a';
        for (let i = 0; i < 120; i++) {
            ctx.beginPath();
            const x = Math.random() * w;
            const y = h * 0.64 + Math.random() * (h * 0.3);
            ctx.ellipse(x, y, 2 + Math.random() * 6, 1 + Math.random() * 3, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // ----- 2. СТВОЛ (реалистичная кора) -----
        const trunkX = w / 2;
        const trunkBottomY = h * 0.78;
        const trunkTopY = h * 0.42;
        const trunkWidthBase = 58;
        const trunkWidthTop = 34;

        // тень под деревом
        ctx.fillStyle = '#426d2e';
        ctx.beginPath();
        ctx.ellipse(trunkX, trunkBottomY + 6, 52, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#2b5620';
        ctx.beginPath();
        ctx.ellipse(trunkX + 4, trunkBottomY + 8, 40, 12, 0, 0, Math.PI * 2);
        ctx.fill();

        // основной ствол (коричневый градиент)
        const trunkGrad = ctx.createLinearGradient(trunkX - 25, trunkTopY, trunkX + 25, trunkBottomY);
        trunkGrad.addColorStop(0, '#8b5a2b');
        trunkGrad.addColorStop(0.5, '#aa6e3a');
        trunkGrad.addColorStop(1, '#7a481f');
        ctx.fillStyle = trunkGrad;

        ctx.beginPath();
        ctx.moveTo(trunkX - trunkWidthBase/2, trunkBottomY);
        ctx.quadraticCurveTo(trunkX - 20, trunkBottomY - 40, trunkX - trunkWidthTop/2, trunkTopY);
        ctx.lineTo(trunkX + trunkWidthTop/2, trunkTopY);
        ctx.quadraticCurveTo(trunkX + 20, trunkBottomY - 40, trunkX + trunkWidthBase/2, trunkBottomY);
        ctx.fill();

        // текстура коры (вертикальные линии и пятна)
        ctx.save();
        ctx.globalCompositeOperation = 'overlay';
        ctx.beginPath();
        ctx.strokeStyle = '#5c381a';
        ctx.lineWidth = 2;
        for (let i = -18; i <= 18; i += 5) {
            ctx.beginPath();
            ctx.moveTo(trunkX + i, trunkTopY + 12);
            ctx.quadraticCurveTo(trunkX + i + 2, trunkTopY + 50, trunkX + i - 1, trunkBottomY - 15);
            ctx.stroke();
        }
        // сучки и кора
        ctx.fillStyle = '#b87a42';
        for (let s = 0; s < 35; s++) {
            ctx.beginPath();
            const offX = trunkX - 15 + Math.random() * 30;
            const offY = trunkTopY + 25 + Math.random() * 90;
            ctx.ellipse(offX, offY, 3 + Math.random() * 6, 1 + Math.random() * 3, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();

        // корни (выходят из основания)
        ctx.fillStyle = '#8b5a2b';
        ctx.beginPath();
        ctx.moveTo(trunkX - 26, trunkBottomY - 5);
        ctx.quadraticCurveTo(trunkX - 44, trunkBottomY + 4, trunkX - 38, trunkBottomY + 12);
        ctx.quadraticCurveTo(trunkX - 24, trunkBottomY + 6, trunkX - 20, trunkBottomY);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(trunkX + 26, trunkBottomY - 4);
        ctx.quadraticCurveTo(trunkX + 44, trunkBottomY + 5, trunkX + 38, trunkBottomY + 14);
        ctx.quadraticCurveTo(trunkX + 26, trunkBottomY + 7, trunkX + 22, trunkBottomY);
        ctx.fill();

        // ----- 3. КРОНА (многослойная листва) -----
        function drawLeafCluster(cx, cy, radiusX, radiusY, angle, color1, color2) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            const grad = ctx.createLinearGradient(-radiusX * 0.4, -radiusY * 0.3, radiusX * 0.6, radiusY * 0.5);
            grad.addColorStop(0, color1);
            grad.addColorStop(1, color2);
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.ellipse(0, 0, radiusX, radiusY, 0, 0, Math.PI * 2);
            ctx.fill();
            // прожилки / блики
            ctx.fillStyle = '#d9f098';
            ctx.beginPath();
            ctx.ellipse(-radiusX * 0.2, -radiusY * 0.15, radiusX * 0.25, radiusY * 0.2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // нижний ярус кроны (раскидистый)
        const crownBaseY = trunkTopY - 8;
        // большие шапки зелени
        drawLeafCluster(trunkX - 18, crownBaseY + 15, 44, 38, -0.2, '#568f2b', '#3c7622');
        drawLeafCluster(trunkX + 22, crownBaseY + 12, 48, 42, 0.15, '#5c9e2e', '#32701c');
        drawLeafCluster(trunkX, crownBaseY + 5, 55, 48, 0.05, '#6aa83a', '#428a25');
        drawLeafCluster(trunkX - 30, crownBaseY - 8, 42, 40, -0.3, '#4e9025', '#2c6e18');
        drawLeafCluster(trunkX + 32, crownBaseY - 6, 44, 40, 0.25, '#58a52a', '#2f7a1a');
        
        // средний ярус (пышный)
        drawLeafCluster(trunkX - 12, crownBaseY - 22, 50, 46, -0.1, '#68b336', '#3f8622');
        drawLeafCluster(trunkX + 14, crownBaseY - 26, 52, 45, 0.12, '#70be3c', '#3d8920');
        drawLeafCluster(trunkX, crownBaseY - 35, 58, 52, 0.0, '#7bc945', '#469c28');
        drawLeafCluster(trunkX - 24, crownBaseY - 40, 44, 42, -0.18, '#5cae2f', '#2f7c18');
        drawLeafCluster(trunkX + 24, crownBaseY - 42, 46, 44, 0.2, '#62b534', '#32831c');
        
        // верхушка (самая яркая)
        drawLeafCluster(trunkX - 6, crownBaseY - 64, 48, 45, -0.05, '#7dd44a', '#4ba32c');
        drawLeafCluster(trunkX + 8, crownBaseY - 68, 46, 44, 0.07, '#88da54', '#52ac30');
        drawLeafCluster(trunkX, crownBaseY - 80, 44, 42, 0.0, '#95e462', '#5dbd38');
        drawLeafCluster(trunkX - 14, crownBaseY - 85, 38, 36, -0.12, '#81d64c', '#49a528');
        drawLeafCluster(trunkX + 12, crownBaseY - 88, 38, 36, 0.1, '#86de50', '#4aac2a');
        
        // финальный "колпачок" — яркий акцент
        ctx.save();
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(trunkX, crownBaseY - 98, 26, 0, Math.PI * 2);
        ctx.fillStyle = '#acf26e';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(trunkX - 4, crownBaseY - 104, 15, 0, Math.PI * 2);
        ctx.fillStyle = '#caff8a';
        ctx.fill();
        ctx.restore();

        // ----- 4. ДЕТАЛИ: СВЕТ И ТЕНЬ, ПЛОДЫ/ЖЕЛУДИ -----
        // легкие блики на листве (солнечные зайчики)
        ctx.fillStyle = '#f5ffc4';
        for (let i = 0; i < 55; i++) {
            ctx.beginPath();
            const angleRand = Math.random() * Math.PI * 2;
            const rad = 18 + Math.random() * 62;
            const xOff = Math.cos(angleRand) * rad;
            const yOff = Math.sin(angleRand) * rad * 0.7 - 30;
            ctx.ellipse(trunkX + xOff, crownBaseY - 28 + yOff, 3 + Math.random() * 6, 2 + Math.random() * 4, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // маленькие желуди / плоды (дуб)
        for (let ac = 0; ac < 32; ac++) {
            ctx.beginPath();
            const angleAc = Math.random() * Math.PI * 2;
            const radiusAc = 22 + Math.random() * 60;
            const acX = trunkX + Math.cos(angleAc) * radiusAc;
            const acY = crownBaseY - 15 + Math.sin(angleAc) * radiusAc * 0.8;
            ctx.ellipse(acX, acY, 3 + Math.random() * 3, 4 + Math.random() * 3, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#bd8a47';
            ctx.fill();
            ctx.fillStyle = '#6d441c';
            ctx.beginPath();
            ctx.ellipse(acX - 1, acY - 1, 1.2, 1.5, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // ----- 5. ТРАВИНКИ И ЦВЕТЫ У ПОДНОЖЬЯ -----
        ctx.lineWidth = 2;
        for (let g = 0; g < 80; g++) {
            ctx.beginPath();
            const baseX = trunkX - 50 + Math.random() * 100;
            const baseY = trunkBottomY + 3 + Math.random() * 24;
            ctx.moveTo(baseX, baseY);
            ctx.quadraticCurveTo(baseX + (Math.random() - 0.5) * 12, baseY - 14 + Math.random() * 12, baseX + (Math.random() - 0.5) * 8, baseY - 28);
            ctx.strokeStyle = '#50862c';
            ctx.stroke();
        }
        // полевые цветы
        for (let f = 0; f < 45; f++) {
            const fx = trunkX - 70 + Math.random() * 140;
            const fy = trunkBottomY - 4 + Math.random() * 32;
            ctx.beginPath();
            ctx.arc(fx, fy, 3 + Math.random() * 4, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${40 + Math.random() * 40}, 75%, 65%)`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(fx - 1, fy - 1, 1.2, 0, Math.PI * 2);
            ctx.fillStyle = '#ffef99';
            ctx.fill();
        }

        // ----- 6. ОБЪЕМ И ВОЗДУШНАЯ АТМОСФЕРА (легкие листочки) -----
        ctx.fillStyle = '#aae67a';
        for (let leaf = 0; leaf < 110; leaf++) {
            ctx.beginPath();
            let leafX = trunkX - 65 + Math.random() * 130;
            let leafY = crownBaseY - 85 + Math.random() * 95;
            ctx.ellipse(leafX, leafY, 2.5 + Math.random() * 5, 1.5 + Math.random() * 3, Math.random() * Math.PI, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // падающий листик (для живости)
        ctx.fillStyle = '#c9f07a';
        ctx.beginPath();
        ctx.ellipse(trunkX + 52, crownBaseY + 22, 5, 3, 0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#90c05a';
        ctx.beginPath();
        ctx.ellipse(trunkX + 48, crownBaseY + 25, 4, 2.5, -0.3, 0, Math.PI * 2);
        ctx.fill();
        
        // ----- 7. СОЛНЕЧНЫЙ СВЕТ (блики на кроне) -----
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.beginPath();
        ctx.ellipse(trunkX - 18, crownBaseY - 74, 20, 14, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#fffab3';
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(trunkX + 20, crownBaseY - 68, 16, 12, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        
        // маленький лучик от солнца (лучистый эффект)
        ctx.save();
        ctx.globalAlpha = 0.2;
        for (let ray = 0; ray < 12; ray++) {
            ctx.beginPath();
            const angle = (ray / 12) * Math.PI * 2;
            const xR = trunkX - 28 + Math.cos(angle) * 48;
            const yR = crownBaseY - 72 + Math.sin(angle) * 40;
            ctx.moveTo(trunkX - 18, crownBaseY - 72);
            ctx.lineTo(xR, yR);
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#ffffbb';
            ctx.stroke();
        }
        ctx.restore();
        
        // ----- 8. ФИНАЛЬНЫЙ ШТРИХ: СТВОЛОВАЯ КОРА (дорисовка) + мох -----
        ctx.fillStyle = '#6c451e';
        for (let m = 0; m < 45; m++) {
            ctx.beginPath();
            const mx = trunkX - 18 + Math.random() * 36;
            const my = trunkTopY + 24 + Math.random() * 90;
            ctx.ellipse(mx, my, 2 + Math.random() * 5, 1 + Math.random() * 2, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.fillStyle = '#8aa862';
        for (let moss = 0; moss < 32; moss++) {
            ctx.beginPath();
            const mossX = trunkX - 24 + Math.random() * 48;
            const mossY = trunkBottomY - 16 + Math.random() * 38;
            ctx.ellipse(mossX, mossY, 3, 1.6, 0.2, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // дополнительно блики на стволе (солнце)
        ctx.beginPath();
        ctx.moveTo(trunkX - 12, trunkTopY + 18);
        ctx.lineTo(trunkX - 5, trunkTopY + 45);
        ctx.lineTo(trunkX - 2, trunkTopY + 38);
        ctx.fillStyle = '#e7b97a';
        ctx.fill();
        
        // тень от кроны на траве (мягкая)
        ctx.fillStyle = '#486e2e';
        ctx.globalAlpha = 0.27;
        ctx.beginPath();
        ctx.ellipse(trunkX + 6, trunkBottomY + 9, 68, 22, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        
        // добавим пару бабочек? нет, пусть будет реалистичное дерево.
        // надпись мелким шрифтом
        ctx.font = "italic 12px 'Segoe UI', cursive";
        ctx.fillStyle = '#315d1a';
        ctx.shadowBlur = 0;
        ctx.fillText("🍂 могучий дуб", trunkX - 40, trunkBottomY + 34);
    })();
</script>
</body>
</html>
