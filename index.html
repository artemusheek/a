<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Огненный Кубик: Перерождение | Аркада с широкими проходами</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Orbitron', monospace;
            background-color: #03050b;
            color: white;
        }
        /* Игровой интерфейс — стильный, минималистичный */
        .game-ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 50px;
            z-index: 20;
            pointer-events: none;
            text-shadow: 0 0 8px black;
        }
        .score-card, .best-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 2px;
            border-bottom: 3px solid #ff8844;
            font-family: monospace;
        }
        .score-card span, .best-card span {
            color: #ffaa55;
            font-size: 2rem;
            margin-left: 12px;
        }
        .start-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(8, 12, 24, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 30px 50px;
            text-align: center;
            z-index: 30;
            border: 1px solid #ff8844;
            box-shadow: 0 0 50px rgba(255, 68, 0, 0.6);
            pointer-events: auto;
            transition: 0.2s;
            min-width: 280px;
        }
        .start-panel h1 {
            margin: 0 0 12px;
            font-size: 2.3rem;
            letter-spacing: 4px;
            background: linear-gradient(45deg, #ffaa66, #ff4411);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .start-panel p {
            margin: 10px 0;
            font-size: 1rem;
            opacity: 0.9;
        }
        .start-btn {
            background: linear-gradient(135deg, #ff6622, #ff4411);
            border: none;
            padding: 14px 32px;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: monospace;
            color: white;
            border-radius: 60px;
            margin-top: 24px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 18px #ff4400;
        }
        .start-btn:hover {
            transform: scale(1.03);
            background: linear-gradient(135deg, #ff8844, #ff6622);
            box-shadow: 0 0 28px #ff6600;
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            background: rgba(0,0,0,0.55);
            width: fit-content;
            margin: 0 auto;
            padding: 6px 20px;
            border-radius: 40px;
            pointer-events: none;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 28px 40px;
            text-align: center;
            z-index: 35;
            border: 1px solid #ff7755;
            display: none;
            flex-direction: column;
            gap: 14px;
            min-width: 260px;
        }
        .restart-btn {
            background: #ff7744;
            border: none;
            padding: 12px 26px;
            border-radius: 60px;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.1s;
        }
        .restart-btn:hover {
            background: #ffaa66;
            transform: scale(1.02);
        }
        @media (max-width: 600px) {
            .score-card, .best-card { font-size: 1rem; padding: 5px 16px; }
            .score-card span, .best-card span { font-size: 1.5rem; }
            .start-panel { padding: 20px 24px; width: 80%; }
        }
    </style>
</head>
<body>
    <div class="game-ui">
        <div class="score-card">✨ ИСКРЫ <span id="scoreValue">0</span></div>
        <div class="best-card">🏆 РЕКОРД <span id="bestValue">0</span></div>
    </div>
    <div class="start-panel" id="startPanel">
        <h1>🔥 ОГНЕННЫЙ КУБ 🔥</h1>
        <p>🌀 Собирай искры | Широкие проходы</p>
        <p>⚡ КЛИК / ПРОБЕЛ — полёт вверх</p>
        <p>🌫️ Дым, жар и атмосфера</p>
        <button class="start-btn" id="startBtn">ЗАЖЕЧЬ ОГОНЬ 🎮</button>
    </div>
    <div class="game-over" id="gameOverPanel">
        <h2>💀 ПЕПЕЛ И СТАЛЬ 💀</h2>
        <p>Твой счёт: <span id="finalScore">0</span></p>
        <button class="restart-btn" id="restartBtn">ВОЗРОДИТЬСЯ 🔥</button>
    </div>
    <div class="instruction">
        🖱️ ЛКМ / ПРОБЕЛ — кубик взлетает | Гравитация | Пролетай в большие отверстия
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- СЦЕНА, КАМЕРА, РЕНДЕРЕРЫ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03050b);
        scene.fog = new THREE.FogExp2(0x03050b, 0.008);
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 6.5);
        camera.lookAt(0, 0.5, 0);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- ОСВЕЩЕНИЕ + ДИНАМИКА ---
        const ambient = new THREE.AmbientLight(0x332222);
        scene.add(ambient);
        const mainLight = new THREE.DirectionalLight(0xffcc99, 1.2);
        mainLight.position.set(2, 4, 3);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x5577aa, 0.5);
        fillLight.position.set(-1, 2, -2);
        scene.add(fillLight);
        const firePulse = new THREE.PointLight(0xff5500, 0.9);
        firePulse.position.set(0, -0.2, 0);
        scene.add(firePulse);

        // --- ИГРОК: КУБ С УГОЛКАМИ ---
        const cubeSize = 0.7;
        const boxGeo = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
        const matFront = new THREE.MeshStandardMaterial({ color: 0xff6633, emissive: 0x441100, metalness: 0.8, roughness: 0.3 });
        const matOther = new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0x331100, metalness: 0.7 });
        const materialsArray = [matOther, matOther, matOther, matOther, matFront, matOther];
        const player = new THREE.Mesh(boxGeo, materialsArray);
        player.castShadow = true;
        scene.add(player);
        
        // ребра для красоты
        const edges = new THREE.EdgesGeometry(boxGeo);
        const wire = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffaa77 }));
        player.add(wire);
        
        // угловые огоньки (8 штук)
        const half = cubeSize / 2;
        const cornerPoints = [
            [-half, half, half], [ half, half, half], [-half, half,-half], [ half, half,-half],
            [-half,-half, half], [ half,-half, half], [-half,-half,-half], [ half,-half,-half]
        ];
        const cornerLights = [];
        cornerPoints.forEach(pos => {
            const light = new THREE.PointLight(0xff4400, 0.75, 1.4);
            light.position.set(pos[0], pos[1], pos[2]);
            player.add(light);
            cornerLights.push(light);
        });

        // --- ДЫМНАЯ АТМОСФЕРА (летающие частицы) ---
        const particleCount = 650;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 7;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 8 - 2;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const smokeMat = new THREE.PointsMaterial({ color: 0xaa88aa, size: 0.055, transparent: true, opacity: 0.45, blending: THREE.AdditiveBlending });
        const smokeField = new THREE.Points(particleGeo, smokeMat);
        scene.add(smokeField);

        // --- ИГРОВАЯ ЛОГИКА (улучшенные широкие проходы)---
        let gameActive = false;
        let score = 0;
        let bestScore = localStorage.getItem('fireCubeBest2') ? parseInt(localStorage.getItem('fireCubeBest2')) : 0;
        document.getElementById('bestValue').innerText = bestScore;
        
        // Физика
        let playerY = 0;
        let playerVelY = 0;
        const GRAVITY = 0.014;
        const JUMP_POWER = -0.38;
        const GROUND_Y = -2.2;
        const CEILING_Y = 2.6;
        
        // Объекты мира
        let obstacles = [];    // группы труб
        let sparks = [];       // собираемые искры
        let frameCount = 0;
        let lastSpawnFrame = 0;
        const SPAWN_INTERVAL_FRAMES = 70;   // чаще спавн, но проходы большие
        const SCROLL_SPEED = 0.022;
        
        // ---------- СОЗДАНИЕ ПРЕПЯТСТВИЙ (широкий проход!!) ----------
        function createWideObstacle(xPos) {
            const group = new THREE.Group();
            const pillarWidth = 0.75;
            const pillarDepth = 0.7;
            // ГЛАВНОЕ: увеличенный зазор для пролета — высота прохода теперь 2.4 юнита (раньше был ~1.4)
            const GAP_HEIGHT = 2.4;   
            // динамический диапазон положения центра прохода, чтобы не упиралось в края
            const minPassageCenter = -1.2;
            const maxPassageCenter = 1.4;
            const passageCenterY = minPassageCenter + Math.random() * (maxPassageCenter - minPassageCenter);
            
            const topBottomOffset = GAP_HEIGHT / 2;
            const upperY = passageCenterY + topBottomOffset;
            const lowerY = passageCenterY - topBottomOffset;
            
            // Верхний столб (длинный)
            const topHeight = 2.6 - upperY; // от верхнего края до прохода
            if (topHeight > 0.3) {
                const topPillarGeo = new THREE.BoxGeometry(pillarWidth, topHeight, pillarDepth);
                const pillarMat = new THREE.MeshStandardMaterial({ color: 0xaa5533, emissive: 0x331100, metalness: 0.5 });
                const topPillar = new THREE.Mesh(topPillarGeo, pillarMat);
                topPillar.position.set(0, upperY + topHeight/2, 0);
                topPillar.castShadow = true;
                group.add(topPillar);
            }
            // Нижний столб
            const bottomHeight = lowerY - (-2.2);
            if (bottomHeight > 0.3) {
                const bottomPillarGeo = new THREE.BoxGeometry(pillarWidth, bottomHeight, pillarDepth);
                const bottomMat = new THREE.MeshStandardMaterial({ color: 0xaa5533, emissive: 0x331100 });
                const bottomPillar = new THREE.Mesh(bottomPillarGeo, bottomMat);
                bottomPillar.position.set(0, lowerY - bottomHeight/2, 0);
                bottomPillar.castShadow = true;
                group.add(bottomPillar);
            }
            
            // Декоративные шипы или свечение на трубах
            group.position.x = xPos;
            group.userData = { passed: false, gapCenter: passageCenterY, gapHeight: GAP_HEIGHT };
            scene.add(group);
            return group;
        }
        
        // Создание искры (огонька с анимацией)
        function createSparkle(x, y) {
            const sparkGroup = new THREE.Group();
            const coreMat = new THREE.MeshStandardMaterial({ color: 0xff7700, emissive: 0xff3300, emissiveIntensity: 0.8 });
            const core = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), coreMat);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xffaa55, transparent: true, opacity: 0.6 });
            const glow = new THREE.Mesh(new THREE.SphereGeometry(0.33, 8, 8), glowMat);
            sparkGroup.add(core);
            sparkGroup.add(glow);
            sparkGroup.position.set(x, y, 0);
            sparkGroup.userData = { type: 'spark', collected: false };
            scene.add(sparkGroup);
            return sparkGroup;
        }
        
        // Сброс игры (перезапуск)
        function resetAndStart() {
            // очистка старых объектов
            obstacles.forEach(obs => scene.remove(obs));
            sparks.forEach(sp => scene.remove(sp));
            obstacles = [];
            sparks = [];
            score = 0;
            document.getElementById('scoreValue').innerText = "0";
            playerY = 0;
            playerVelY = 0;
            player.position.y = 0;
            frameCount = 0;
            lastSpawnFrame = 0;
            gameActive = true;
            document.getElementById('gameOverPanel').style.display = 'none';
            document.getElementById('startPanel').style.display = 'none';
            
            // стартовые препятствия для плавности (2 штуки)
            for (let i = 0; i < 2; i++) {
                let obs = createWideObstacle(4.2 + i * 3.5);
                obstacles.push(obs);
                // добавим искры с хорошим шансом
                if (Math.random() < 0.7) {
                    let sparkY = -1.2 + Math.random() * 3.2;
                    let sparkObj = createSparkle(4.2 + i * 3.5 + 1.2, sparkY);
                    sparks.push(sparkObj);
                }
            }
            // бонусная искра рядом
            let starter = createSparkle(2.2, 0.3);
            sparks.push(starter);
        }
        
        // Проверка коллизий с широкими проходами (честная)
        function checkCollisions() {
            const playerBox = new THREE.Box3().setFromObject(player);
            const playerPosX = player.position.x;
            
            // Столкновение с трубами
            for (let obs of obstacles) {
                const obsBox = new THREE.Box3().setFromObject(obs);
                if (playerBox.intersectsBox(obsBox)) {
                    gameActive = false;
                    endGame();
                    return false;
                }
                // для дополнительной безопасности: проверка по Y, если вдруг пересекло границу прохода? уже коробка отработает
            }
            
            // Сбор искр
            for (let i=0; i<sparks.length; i++) {
                const sparkBox = new THREE.Box3().setFromObject(sparks[i]);
                if (playerBox.intersectsBox(sparkBox) && !sparks[i].userData.collected) {
                    sparks[i].userData.collected = true;
                    score++;
                    document.getElementById('scoreValue').innerText = score;
                    // визуальный эффект
                    firePulse.intensity = 1.3;
                    setTimeout(() => { if(gameActive) firePulse.intensity = 0.9; }, 120);
                    scene.remove(sparks[i]);
                    sparks.splice(i,1);
                    i--;
                }
            }
            return true;
        }
        
        function endGame() {
            gameActive = false;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('gameOverPanel').style.display = 'flex';
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('fireCubeBest2', bestScore);
                document.getElementById('bestValue').innerText = bestScore;
            }
        }
        
        function updateGameplay() {
            if (!gameActive) return;
            
            // Физика игрока
            playerVelY += GRAVITY;
            playerY += playerVelY;
            if (playerY > CEILING_Y) { playerY = CEILING_Y; playerVelY = 0; }
            if (playerY < GROUND_Y) { 
                playerY = GROUND_Y; 
                playerVelY = 0;
                // маленькая задержка чтобы не читерить
            }
            player.position.y = playerY;
            // Вращение куба в полёте
            player.rotation.x = playerVelY * 1.5;
            player.rotation.z = playerVelY * 0.9;
            
            // Движение препятствий и искр
            obstacles.forEach(obs => obs.position.x -= SCROLL_SPEED);
            sparks.forEach(sp => {
                sp.position.x -= SCROLL_SPEED;
                sp.children[0].rotation.y += 0.07;
                sp.children[1].rotation.x += 0.05;
            });
            
            // Удаление объектов за левой границей
            obstacles = obstacles.filter(obs => {
                if (obs.position.x < -3.8) {
                    scene.remove(obs);
                    return false;
                }
                return true;
            });
            sparks = sparks.filter(sp => {
                if (sp.position.x < -4.0) {
                    scene.remove(sp);
                    return false;
                }
                return true;
            });
            
            // СПАВН новых препятствий с большим проходом
            if (frameCount - lastSpawnFrame > SPAWN_INTERVAL_FRAMES) {
                lastSpawnFrame = frameCount;
                let newObs = createWideObstacle(5.0);
                obstacles.push(newObs);
                // всегда добавляем 1-2 искры рядом с новым препятствием
                const sparkCount = Math.random() > 0.4 ? 1 : 2;
                for (let s = 0; s < sparkCount; s++) {
                    let randY = -1.3 + Math.random() * 3.4;
                    let sparkX = 5.0 + 0.6 + (s * 0.5);
                    let newSpark = createSparkle(sparkX, randY);
                    sparks.push(newSpark);
                }
                // дополнительная искра в случайном месте
                if (Math.random() < 0.5) {
                    let extraSpark = createSparkle(5.3, -0.5 + Math.random() * 2.8);
                    sparks.push(extraSpark);
                }
            }
            
            // Проверка коллизий
            const collisionFree = checkCollisions();
            if (!collisionFree) return;
            
            frameCount++;
        }
        
        // Прыжок
        function jump() {
            if (!gameActive) return;
            playerVelY = JUMP_POWER;
            // анимация углов + звуковое свечение
            cornerLights.forEach(l => { l.intensity = 1.1; setTimeout(() => { if(gameActive) l.intensity = 0.7; }, 180); });
            // маленькая визуальная искра от куба
            firePulse.intensity = 1.2;
            setTimeout(() => { if(gameActive) firePulse.intensity = 0.8; }, 200);
        }
        
        // --- УПРАВЛЕНИЕ ---
        window.addEventListener('click', () => { if(gameActive) jump(); });
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') {
                e.preventDefault();
                if(gameActive) jump();
            }
        });
        
        // Кнопки старта и рестарта
        document.getElementById('startBtn').addEventListener('click', () => resetAndStart());
        document.getElementById('restartBtn').addEventListener('click', () => resetAndStart());
        
        // --- АНИМАЦИЯ ОКРУЖЕНИЯ (дым, угли)---
        let envTime = 0;
        function animateEnvironment() {
            envTime += 0.02;
            smokeField.rotation.y += 0.002;
            smokeField.rotation.x = Math.sin(envTime * 0.2) * 0.1;
            // пульсация угловых огней
            cornerLights.forEach((light, idx) => {
                const intensity = 0.6 + Math.sin(envTime * 5 + idx) * 0.3;
                light.intensity = intensity;
            });
            firePulse.intensity = 0.75 + Math.sin(envTime * 6) * 0.2;
            // Камера мягко следует за кубиком
            const targetCamY = playerY * 0.15;
            camera.position.y += (targetCamY - camera.position.y) * 0.07;
            camera.lookAt(0, playerY * 0.5 + 0.2, 0);
        }
        
        // --- ЗВЕЗДНОЕ ПОЛЕ (декор)---
        const starCount = 1200;
        const starGeo = new THREE.BufferGeometry();
        const starPositionsArray = new Float32Array(starCount * 3);
        for (let i=0; i<starCount; i++) {
            starPositionsArray[i*3] = (Math.random() - 0.5) * 180;
            starPositionsArray[i*3+1] = (Math.random() - 0.5) * 40;
            starPositionsArray[i*3+2] = (Math.random() - 0.5) * 70 - 40;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositionsArray, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xffaa88, size: 0.045, transparent: true, opacity: 0.6 });
        const starsField = new THREE.Points(starGeo, starsMat);
        scene.add(starsField);
        
        // --- АНИМАЦИОННЫЙ ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            if (gameActive) {
                updateGameplay();
            }
            animateEnvironment();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        // начальное состояние: показываем стартовое меню
        gameActive = false;
        player.position.y = 0;
        animate();
        
        // небольшая инструкция
        console.log("Игра готова! Проходы увеличены до 2.4 юнитов, теперь легко пролетать!");
    </script>
</body>
</html>
