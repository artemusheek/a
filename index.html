<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя картинка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }
        
        img {
            width: 100%;
            height: auto;
            display: block;
            image-rendering: crisp-edges;   /* для Firefox */
            image-rendering: pixelated;      /* для Chrome/Safari */
            image-rendering: crisp-edges;   /* для Edge */
        }
    </style>
</head>
<body>
    <img alt="creebet.png" 
         src="https://github.com/artemusheek/a/blob/main/creebet.png?raw=true">
</body>
</html>
