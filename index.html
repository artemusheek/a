<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Магический Куб: Уголки Огня и Тлеющий Дым</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Montserrat', 'Orbitron', monospace;
            background: radial-gradient(circle at center, #0a0f1e 0%, #03050b 100%);
            color: white;
        }

        /* Информационная панель */
        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 12px 24px;
            pointer-events: none;
            z-index: 10;
            border-left: 4px solid #ff884d;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            font-weight: 500;
        }

        .info-panel h1 {
            margin: 0 0 6px;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .status {
            display: flex;
            gap: 20px;
            margin-top: 8px;
            font-family: monospace;
        }

        .status span {
            color: #ffaa66;
        }

        .flame-badge {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background: #ff6600;
            box-shadow: 0 0 6px #ff4400;
            margin-right: 6px;
            animation: pulse 1.2s infinite;
        }

        .smoke-badge {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #aaaacc;
            box-shadow: 0 0 4px #88aaff;
            margin-right: 6px;
            opacity: 0.8;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.9);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        /* подпись углов */
        .controls-note {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }

        @media (max-width: 600px) {
            .info-panel { font-size: 10px; padding: 8px 16px; }
            .status { gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <h1>✨ ОГНЕННЫЙ КУБ ✨</h1>
        <div>Вращение по X и Y | Уголки пылают <span class="flame-badge"></span> при активации</div>
        <div class="status">
            <div>🔥 УГЛЫ: <span id="flameStatus">АКТИВНЫ</span></div>
            <div>🌫️ ДЫМ: <span id="smokeStatus">ТУМАННО</span></div>
        </div>
    </div>
    <div class="controls-note">
        ⚡ Эффекты: огонь на углах + дым, который <span style="color:#ffaa88;">"потухает"</span> иногда
    </div>

    <!-- Подключаем Three.js и вспомогательные библиотеки через CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Инициализация сцены, камеры, рендереров ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03050b);
        scene.fog = new THREE.FogExp2(0x03050b, 0.008); // легкая дымка окружения

        // Камера: угол обзора, соотношение, ближняя/дальняя
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 5);
        camera.lookAt(0, 0, 0);

        // WebGL рендерер
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // тени для атмосферы
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // CSS2 рендерер для текстовых меток углов (эффект "горящих уголков")
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- Освещение для реалистичного куба и углов ---
        // Ambient soft light
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        // Основной направленный свет
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(2, 5, 3);
        dirLight.castShadow = true;
        dirLight.receiveShadow = false;
        scene.add(dirLight);
        // Задний контровой свет (для подсветки граней)
        const backLight = new THREE.PointLight(0x4466cc, 0.4);
        backLight.position.set(-2, 1, -3);
        scene.add(backLight);
        // Динамический цветной свет снизу для эффекта пожара
        const fireLight = new THREE.PointLight(0xff5500, 0.8);
        fireLight.position.set(0, -1.2, 0);
        scene.add(fireLight);
        
        // Дополнительные источники для свечения углов
        const cornerGlowLights = [];
        
        // --- Создание куба с гранями полупрозрачными материалами, чтобы углы сияли ---
        const cubeSize = 1.6;
        const geometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
        
        // Материалы граней: слегка прозрачные, с блеском, чтобы угловые огни просвечивали
        const materials = [
            new THREE.MeshStandardMaterial({ color: 0xdd4422, roughness: 0.3, metalness: 0.7, emissive: 0x221100, transparent: true, opacity: 0.85 }), // right
            new THREE.MeshStandardMaterial({ color: 0x44aa88, roughness: 0.3, metalness: 0.6, emissive: 0x002211, transparent: true, opacity: 0.85 }), // left
            new THREE.MeshStandardMaterial({ color: 0xaa66cc, roughness: 0.3, metalness: 0.7, emissive: 0x220033, transparent: true, opacity: 0.85 }), // up
            new THREE.MeshStandardMaterial({ color: 0x66ccaa, roughness: 0.3, metalness: 0.6, emissive: 0x113322, transparent: true, opacity: 0.85 }), // down
            new THREE.MeshStandardMaterial({ color: 0xffaa55, roughness: 0.4, metalness: 0.8, emissive: 0x331a00, transparent: true, opacity: 0.85 }), // front
            new THREE.MeshStandardMaterial({ color: 0x55aaff, roughness: 0.4, metalness: 0.8, emissive: 0x001133, transparent: true, opacity: 0.85 })  // back
        ];
        
        const cube = new THREE.Mesh(geometry, materials);
        cube.castShadow = true;
        cube.receiveShadow = false;
        scene.add(cube);
        
        // Добавим каркас ребер для технологичности (тонкие светящиеся линии)
        const edgesGeo = new THREE.EdgesGeometry(geometry);
        const edgesMat = new THREE.LineBasicMaterial({ color: 0xffaa66, linewidth: 1 });
        const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
        cube.add(wireframe);
        
        // --- Угловые маркеры (CSS2D) с текстом и эффектом пламени ---
        // Координаты 8 вершин куба (половинный размер = cubeSize/2)
        const half = cubeSize / 2;
        const cornersPos = [
            { pos: [-half,  half,  half], name: "Верх-Перед-Правый", angleId: 0 },
            { pos: [ half,  half,  half], name: "Верх-Перед-Левый", angleId: 1 },
            { pos: [-half,  half, -half], name: "Верх-Зад-Правый", angleId: 2 },
            { pos: [ half,  half, -half], name: "Верх-Зад-Левый", angleId: 3 },
            { pos: [-half, -half,  half], name: "Низ-Перед-Правый", angleId: 4 },
            { pos: [ half, -half,  half], name: "Низ-Перед-Левый", angleId: 5 },
            { pos: [-half, -half, -half], name: "Низ-Зад-Правый", angleId: 6 },
            { pos: [ half, -half, -half], name: "Низ-Зад-Левый", angleId: 7 }
        ];
        
        // Создаем массив объектов для углов: храним CSS2D элемент и вспышку/пламя
        const cornerItems = [];
        
        cornersPos.forEach((corner) => {
            // Контейнер div с иконкой пламени и текстом
            const div = document.createElement('div');
            div.style.backgroundColor = 'rgba(0,0,0,0.65)';
            div.style.borderRadius = '20px';
            div.style.padding = '4px 10px';
            div.style.fontFamily = 'monospace';
            div.style.fontWeight = 'bold';
            div.style.fontSize = '12px';
            div.style.backdropFilter = 'blur(4px)';
            div.style.border = '1px solid #ff8844';
            div.style.boxShadow = '0 0 12px rgba(255,68,0,0.8)';
            div.style.transition = 'all 0.2s ease';
            div.style.textAlign = 'center';
            div.style.whiteSpace = 'nowrap';
            
            // Иконка пламени и текст
            const flameIcon = document.createElement('span');
            flameIcon.innerHTML = '🔥';
            flameIcon.style.marginRight = '6px';
            flameIcon.style.fontSize = '14px';
            flameIcon.style.filter = 'drop-shadow(0 0 2px orange)';
            
            const textSpan = document.createElement('span');
            textSpan.innerText = `Угол ${corner.angleId+1}`;
            textSpan.style.color = '#ffaa77';
            
            div.appendChild(flameIcon);
            div.appendChild(textSpan);
            
            // Дополнительно маленькая светящаяся точка
            const css2dObj = new CSS2DObject(div);
            css2dObj.position.set(corner.pos[0], corner.pos[1], corner.pos[2]);
            cube.add(css2dObj);
            
            // Добавляем точечные источники света на каждый угол для сияния (эффект "зажглись уголки")
            const glowLight = new THREE.PointLight(0xff4400, 0.0, 1.2);
            glowLight.position.set(corner.pos[0], corner.pos[1], corner.pos[2]);
            cube.add(glowLight);
            cornerGlowLights.push(glowLight);
            
            // Сохраняем данные для анимации состояния углов
            cornerItems.push({
                element: css2dObj,
                light: glowLight,
                div: div,
                defaultColor: '#ff8844',
                active: true,   // изначально углы горят
                intensity: 0.9
            });
        });
        
        // --- Система дыма (частицы), который иногда "потухает" (исчезает/затухает) ---
        let particleSystem = null;
        let smokeMaterial = null;
        let smokeParticles = [];
        let smokeActive = true;
        let smokeTimeout = null;
        
        // Функция создания дыма: набор частиц с анимацией
        function initSmoke() {
            if (particleSystem) {
                scene.remove(particleSystem);
                // очищаем геометрию
                if (particleSystem.geometry) particleSystem.geometry.dispose();
            }
            
            const particleCount = 450;
            const geometryParticles = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = []; // для анимации движения вверх и вращения
            
            // Разброс частиц вокруг куба, но в основном снизу и по бокам для эффекта тлеющего дыма
            for (let i = 0; i < particleCount; i++) {
                // сфера вокруг куба радиусом 1.2-2.2
                const radius = 1.4 + Math.random() * 1.2;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const x = Math.sin(phi) * Math.cos(theta) * radius;
                const y = Math.sin(phi) * Math.sin(theta) * radius * 0.8 + 0.2; // смещение вверх
                const z = Math.cos(phi) * radius;
                positions[i*3] = x;
                positions[i*3+1] = y;
                positions[i*3+2] = z;
                velocities.push({
                    speedY: 0.003 + Math.random() * 0.008,
                    speedX: (Math.random() - 0.5) * 0.004,
                    speedZ: (Math.random() - 0.5) * 0.004,
                    life: Math.random() * 1.0,
                    maxLife: 0.8 + Math.random() * 0.7,
                    basePos: { x, y, z }
                });
            }
            geometryParticles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            // Текстура дыма (canvas кружок с градиентом)
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(80,80,100,0)';
            ctx.fillRect(0, 0, 32, 32);
            ctx.beginPath();
            ctx.arc(16, 16, 14, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(160, 170, 200, 0.7)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(16, 16, 8, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(220, 220, 240, 0.9)';
            ctx.fill();
            const smokeTexture = new THREE.CanvasTexture(canvas);
            
            smokeMaterial = new THREE.PointsMaterial({
                color: 0xaa99cc,
                size: 0.08,
                transparent: true,
                opacity: 0.65,
                blending: THREE.AdditiveBlending,
                map: smokeTexture
            });
            
            particleSystem = new THREE.Points(geometryParticles, smokeMaterial);
            scene.add(particleSystem);
            
            // сохраним velocities в атрибут объекта для анимации
            particleSystem.userData = { velocities, positionsRef: positions, count: particleCount, geometry: geometryParticles };
        }
        
        // Функция "потухание дыма": постепенное снижение прозрачности и уменьшение активности
        let fadeSmokeInterval = null;
        function extinguishSmoke() {
            if (!smokeActive) return; // уже потушен
            smokeActive = false;
            // обновить UI
            document.getElementById('smokeStatus').innerHTML = '🌫️ ЗАТУХАЕТ';
            document.getElementById('smokeStatus').style.color = '#aaaacc';
            
            // Плавное затухание дыма
            if (fadeSmokeInterval) clearInterval(fadeSmokeInterval);
            let opacityVal = smokeMaterial.opacity;
            fadeSmokeInterval = setInterval(() => {
                if (!smokeMaterial) return;
                if (opacityVal > 0.05) {
                    opacityVal -= 0.025;
                    smokeMaterial.opacity = opacityVal;
                } else {
                    smokeMaterial.opacity = 0;
                    clearInterval(fadeSmokeInterval);
                    fadeSmokeInterval = null;
                    // полностью скрыть, но не удалять
                    if (particleSystem) particleSystem.visible = false;
                    document.getElementById('smokeStatus').innerHTML = '💨 ПОТУХ';
                }
            }, 80);
            
            // Через случайное время (дым снова появится - регенерация)
            if (smokeTimeout) clearTimeout(smokeTimeout);
            smokeTimeout = setTimeout(() => {
                // Возрождение дыма снова
                if (particleSystem) particleSystem.visible = true;
                smokeActive = true;
                if (fadeSmokeInterval) clearInterval(fadeSmokeInterval);
                if (smokeMaterial) {
                    smokeMaterial.opacity = 0.7;
                }
                document.getElementById('smokeStatus').innerHTML = '🌫️ ТУМАННО';
                document.getElementById('smokeStatus').style.color = '#ffffff';
                // перезапустим цикл "потухания" через случайное время
                scheduleSmokeExtinguish();
            }, 4000 + Math.random() * 5000);
        }
        
        function scheduleSmokeExtinguish() {
            if (window.smokeTimer) clearTimeout(window.smokeTimer);
            // случайная задержка от 5 до 12 секунд
            const delay = 5000 + Math.random() * 8000;
            window.smokeTimer = setTimeout(() => {
                if (smokeActive) {
                    extinguishSmoke();
                } else {
                    // если дым уже потушен, но еще не воскрес, то просто перепланируем
                    scheduleSmokeExtinguish();
                }
            }, delay);
        }
        
        // Обновление анимации частиц дыма (поднимаются и вращаются)
        function updateSmokeAnimation() {
            if (!particleSystem || !particleSystem.userData.velocities) return;
            const data = particleSystem.userData;
            const velocities = data.velocities;
            const positionsAttr = particleSystem.geometry.attributes.position;
            const positionsArray = positionsAttr.array;
            const count = data.count;
            
            let anyUpdate = false;
            for (let i = 0; i < count; i++) {
                const vel = velocities[i];
                // двигаем частицы плавно вверх и по кругу
                let newY = positionsArray[i*3+1] + vel.speedY;
                let newX = positionsArray[i*3] + vel.speedX;
                let newZ = positionsArray[i*3+2] + vel.speedZ;
                // сброс если слишком высоко или далеко
                if (newY > 1.8 || Math.abs(newX) > 2.2 || Math.abs(newZ) > 2.2) {
                    // ресет в случайную позицию вокруг куба
                    const radius = 1.2 + Math.random() * 1.2;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    newX = Math.sin(phi) * Math.cos(theta) * radius;
                    newY = Math.sin(phi) * Math.sin(theta) * radius * 0.6 - 0.4;
                    newZ = Math.cos(phi) * radius;
                    // обновляем базовую "цель"
                    vel.basePos = { x: newX, y: newY, z: newZ };
                    // небольшая вариация скорости
                    vel.speedY = 0.003 + Math.random() * 0.009;
                }
                positionsArray[i*3] = newX;
                positionsArray[i*3+1] = newY;
                positionsArray[i*3+2] = newZ;
                anyUpdate = true;
            }
            if (anyUpdate) positionsAttr.needsUpdate = true;
        }
        
        // --- Функция для управления эффектом углов (огонь то появляется, то остается всегда горящим, но яркость пульсирует) ---
        // По условию "уголки зажглись в прямом случае" - мы сделаем так, что углы всегда излучают пламя,
        // однако интенсивность света и яркость CSS меток могут "мерцать", создавая динамику.
        // Также пусть иногда происходит вспышка.
        let timeAcc = 0;
        
        function updateCornerFlames(deltaTime) {
            timeAcc += deltaTime;
            // Пульсация интенсивности огня на углах (живой эффект)
            const pulse = 0.6 + Math.sin(timeAcc * 5) * 0.4;
            cornerItems.forEach((item, idx) => {
                // всегда активны - "уголки зажглись" в прямом смысле
                const intensityBase = 0.7;
                const intensityVar = 0.5 + Math.sin(timeAcc * 3 + idx) * 0.3;
                const finalIntensity = Math.min(1.2, intensityBase + intensityVar * 0.6);
                if (item.light) {
                    item.light.intensity = finalIntensity * 0.9;
                }
                // Меняем свечение div границы
                if (item.div) {
                    const glowStrength = 6 + Math.sin(timeAcc * 8 + idx) * 4;
                    item.div.style.boxShadow = `0 0 ${glowStrength}px rgba(255, 80, 40, 0.9)`;
                    item.div.style.borderColor = `rgb(255, ${120 + Math.sin(timeAcc*10+idx)*60}, 50)`;
                }
            });
            // динамический свет снизу куба тоже меняется
            fireLight.intensity = 0.7 + Math.sin(timeAcc * 4) * 0.3;
        }
        
        // --- Вращение куба по осям X и Y (автоматическое) ---
        let rotX = 0;
        let rotY = 0;
        const rotSpeedX = 0.008;
        const rotSpeedY = 0.012;
        
        // --- Дополнительные искорки (мелкие частицы для атмосферы) ---
        const sparkleGeo = new THREE.BufferGeometry();
        const sparkleCount = 300;
        const sparklePositions = new Float32Array(sparkleCount * 3);
        for (let i = 0; i < sparkleCount; i++) {
            sparklePositions[i*3] = (Math.random() - 0.5) * 6;
            sparklePositions[i*3+1] = (Math.random() - 0.5) * 4;
            sparklePositions[i*3+2] = (Math.random() - 0.5) * 6 - 2;
        }
        sparkleGeo.setAttribute('position', new THREE.BufferAttribute(sparklePositions, 3));
        const sparkleMat = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.03, transparent: true, blending: THREE.AdditiveBlending });
        const sparkles = new THREE.Points(sparkleGeo, sparkleMat);
        scene.add(sparkles);
        
        // --- Анимация вращения искр и куба ---
        function animateSparkles() {
            sparkles.rotation.y += 0.005;
            sparkles.rotation.x += 0.003;
        }
        
        // --- Инициализация всех эффектов, запуск дыма с периодическим потуханием ---
        initSmoke();
        scheduleSmokeExtinguish();
        
        // Для корректного обновления угловых меток (CSS2D объекты следуют за кубом автоматически, тк добавлены к кубу)
        // Настройка простых controls не требуется, но можно добавить для панорамирования, но мы не добавляем чтобы куб вращался сам.
        // Однако оставим возможность пользователю взаимодействовать? не обязательно, вращение автоматическое.
        
        // Анимационный цикл
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            // Вращение куба по X и Y
            rotX += rotSpeedX;
            rotY += rotSpeedY;
            cube.rotation.x = rotX;
            cube.rotation.y = rotY;
            
            // Обновление эффектов огня на углах
            updateCornerFlames(delta);
            
            // Анимация дыма (если активен и видим)
            if (smokeActive && particleSystem && particleSystem.visible) {
                updateSmokeAnimation();
            } else if (!smokeActive && particleSystem && !particleSystem.visible) {
                // ничего не делаем, дым потушен визуально
            } else if (!smokeActive && particleSystem && particleSystem.visible && smokeMaterial.opacity <= 0.05) {
                particleSystem.visible = false;
            }
            
            animateSparkles();
            
            // Небольшое покачивание дополнительного света
            fireLight.position.x = Math.sin(Date.now() * 0.003) * 0.2;
            fireLight.intensity = 0.7 + Math.sin(Date.now() * 0.005) * 0.4;
            
            // Рендеринг
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            
            requestAnimationFrame(animate);
        }
        
        // Обработка ресайза окна
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Запуск
        animate();
        
        // Дополнительно: сообщение в консоль
        console.log('Куб активирован | Уголки пылают огнем | Дым периодически тухнет и возрождается');
    </script>
</body>
</html>
