<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Огненный Кубик: Поймай Искру | 3D Аркада</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Orbitron', 'Monaco', monospace;
            color: white;
            background-color: #03050b;
        }
        /* UI интерфейс игры */
        .game-ui {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
            z-index: 20;
            pointer-events: none;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .score-box, .best-box {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.5rem;
            letter-spacing: 2px;
            border-bottom: 2px solid #ff8844;
            font-family: monospace;
        }
        .score-box span, .best-box span {
            color: #ffaa66;
            font-size: 2rem;
            margin-left: 8px;
        }
        .start-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,15,25,0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px 40px;
            text-align: center;
            z-index: 30;
            border: 1px solid #ff8844;
            box-shadow: 0 0 40px rgba(255,68,0,0.5);
            pointer-events: auto;
            font-family: monospace;
            transition: 0.2s;
        }
        .start-panel h1 {
            margin: 0 0 12px;
            font-size: 2.2rem;
            letter-spacing: 4px;
        }
        .start-panel p {
            margin: 8px 0;
            font-size: 1rem;
        }
        .start-btn {
            background: #ff6622;
            border: none;
            padding: 12px 28px;
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            color: white;
            border-radius: 60px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 12px #ff4400;
        }
        .start-btn:hover {
            background: #ff4411;
            transform: scale(1.02);
            box-shadow: 0 0 22px #ff6600;
        }
        .instruction {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            width: fit-content;
            margin: 0 auto;
            padding: 6px 16px;
            border-radius: 40px;
            pointer-events: none;
            z-index: 20;
            font-family: monospace;
        }
        @media (max-width: 600px) {
            .score-box, .best-box { font-size: 1rem; padding: 4px 12px; }
            .score-box span, .best-box span { font-size: 1.5rem; }
            .start-panel { padding: 16px 24px; width: 80%; }
            .start-panel h1 { font-size: 1.8rem; }
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px 32px;
            text-align: center;
            z-index: 35;
            border: 1px solid #ff5555;
            display: none;
            flex-direction: column;
            gap: 12px;
            min-width: 240px;
        }
        .restart-btn {
            background: #ff8844;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="game-ui">
        <div class="score-box">🔥 ИСКРЫ <span id="scoreValue">0</span></div>
        <div class="best-box">🏆 РЕКОРД <span id="bestValue">0</span></div>
    </div>
    <div class="start-panel" id="startPanel">
        <h1>✨ ОГНЕННЫЙ КУБ ✨</h1>
        <p>🌀 Поймай искру, избегай столбов!</p>
        <p>⚡ КЛИК / ПРОБЕЛ — взлететь вверх</p>
        <p>🌫️ Дым и угли вокруг — атмосфера</p>
        <button class="start-btn" id="startBtn">ЗАЖЕЧЬ ИГРУ 🔥</button>
    </div>
    <div class="game-over" id="gameOverPanel">
        <h2>💀 ПЕПЕЛ 💀</h2>
        <p>Счёт: <span id="finalScore">0</span></p>
        <button class="restart-btn" id="restartBtn">ВОЗРОДИТЬСЯ ♻️</button>
    </div>
    <div class="instruction">
        🖱️ ЛКМ / ПРОБЕЛ — кубик летит вверх | Гравитация притягивает вниз
    </div>

    <!-- Подключение Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- ИНИЦИАЛИЗАЦИЯ СЦЕНЫ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03050b);
        scene.fog = new THREE.FogExp2(0x03050b, 0.012);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 7);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- ОСВЕЩЕНИЕ ---
        const ambient = new THREE.AmbientLight(0x222222);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffaa88, 1);
        dirLight.position.set(3, 5, 2);
        dirLight.castShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x4466ff, 0.5);
        backLight.position.set(-2, 2, -3);
        scene.add(backLight);
        const fireGlow = new THREE.PointLight(0xff5500, 0.9);
        fireGlow.position.set(0, -0.5, 0);
        scene.add(fireGlow);

        // --- СОЗДАНИЕ КУБА (ИГРОК) ---
        const cubeSize = 0.7;
        const geometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
        const materials = [
            new THREE.MeshStandardMaterial({ color: 0xff6633, emissive: 0x441100, metalness: 0.7, roughness: 0.3 }),
            new THREE.MeshStandardMaterial({ color: 0xff8833, emissive: 0x331100, metalness: 0.7 }),
            new THREE.MeshStandardMaterial({ color: 0xff5533, emissive: 0x552200 }),
            new THREE.MeshStandardMaterial({ color: 0xff7733, emissive: 0x331100 }),
            new THREE.MeshStandardMaterial({ color: 0xff9944, emissive: 0x442200 }),
            new THREE.MeshStandardMaterial({ color: 0xff6644, emissive: 0x331100 })
        ];
        const playerCube = new THREE.Mesh(geometry, materials);
        playerCube.castShadow = true;
        playerCube.receiveShadow = false;
        scene.add(playerCube);
        
        // добавим ребра для стиля
        const edgesGeo = new THREE.EdgesGeometry(geometry);
        const edgesMat = new THREE.LineBasicMaterial({ color: 0xffaa66 });
        const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
        playerCube.add(wireframe);
        
        // Уголки куба с пламенем (декор)
        const half = cubeSize / 2;
        const cornerLights = [];
        const cornersPos = [
            [-half, half, half], [ half, half, half], [-half, half,-half], [ half, half,-half],
            [-half,-half, half], [ half,-half, half], [-half,-half,-half], [ half,-half,-half]
        ];
        cornersPos.forEach(pos => {
            const light = new THREE.PointLight(0xff4400, 0.7, 1.5);
            light.position.set(pos[0], pos[1], pos[2]);
            playerCube.add(light);
            cornerLights.push(light);
        });

        // --- ДЫМНАЯ СИСТЕМА (атмосфера) ---
        const smokeParticleCount = 400;
        const smokeGeo = new THREE.BufferGeometry();
        const smokePositions = new Float32Array(smokeParticleCount * 3);
        for (let i = 0; i < smokeParticleCount; i++) {
            smokePositions[i*3] = (Math.random() - 0.5) * 5;
            smokePositions[i*3+1] = (Math.random() - 0.5) * 4;
            smokePositions[i*3+2] = (Math.random() - 0.5) * 6 - 2;
        }
        smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePositions, 3));
        const smokeMat = new THREE.PointsMaterial({ color: 0xaa99bb, size: 0.06, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const smokeSys = new THREE.Points(smokeGeo, smokeMat);
        scene.add(smokeSys);
        
        // --- ПРЕПЯТСТВИЯ: пары столбов (трубы) и собираемые искры ---
        let obstacles = [];
        let sparks = [];
        let gameActive = false;
        let score = 0;
        let bestScore = localStorage.getItem('fireCubeBest') ? parseInt(localStorage.getItem('fireCubeBest')) : 0;
        document.getElementById('bestValue').innerText = bestScore;
        
        // физика игрока
        let playerVelY = 0;
        let playerPosY = 0;
        const GRAVITY = 0.018;
        const JUMP_FORCE = -0.45;
        const GROUND_Y = -2.0;
        const CEILING_Y = 2.8;
        
        // генерация мира
        let frameCounter = 0;
        let spawnGap = 85; // кадров между спавном пары препятствий
        let lastSpawnFrame = 0;
        
        // скорость движения препятствий (влево)
        const SCROLL_SPEED = 0.025;
        
        // CSS2D для меток искр (огоньки)
        
        // Функция создания пары столбов (труб) с промежутком
        function createObstaclePair(xPos = 4.5) {
            const group = new THREE.Group();
            const pillarWidth = 0.65;
            const pillarDepth = 0.65;
            const gapHeight = 1.8;
            const minTop = -1.2;
            const maxBottom = 1.5;
            // случайный центр прохода
            const passageY = minTop + Math.random() * (maxBottom - minTop);
            const topHeight = passageY + gapHeight/2;
            const bottomHeight = -2.0 - (passageY - gapHeight/2);
            
            // Верхний столб
            const topGeo = new THREE.BoxGeometry(pillarWidth, 3.5, pillarDepth);
            const topMat = new THREE.MeshStandardMaterial({ color: 0xaa6644, emissive: 0x331100, metalness: 0.5 });
            const topPillar = new THREE.Mesh(topGeo, topMat);
            topPillar.position.set(0, topHeight, 0);
            topPillar.castShadow = true;
            // Нижний столб
            const bottomGeo = new THREE.BoxGeometry(pillarWidth, 3.2, pillarDepth);
            const bottomPillar = new THREE.Mesh(bottomGeo, topMat);
            bottomPillar.position.set(0, passageY - gapHeight/2 - 1.6, 0);
            bottomPillar.castShadow = true;
            
            group.add(topPillar);
            group.add(bottomPillar);
            group.position.x = xPos;
            group.userData = { passed: false, type: 'obstacle' };
            scene.add(group);
            return group;
        }
        
        // Создание огненной искры (сферы с частицами)
        function createSpark(xPos, yPos) {
            const sparkGroup = new THREE.Group();
            const core = new THREE.Mesh(
                new THREE.SphereGeometry(0.18, 12, 12),
                new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff2200, emissiveIntensity: 0.9 })
            );
            sparkGroup.add(core);
            // ореол
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xff8844, transparent: true, opacity: 0.5 });
            const aura = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), glowMat);
            sparkGroup.add(aura);
            sparkGroup.position.set(xPos, yPos, 0);
            sparkGroup.userData = { type: 'spark', collected: false };
            scene.add(sparkGroup);
            return sparkGroup;
        }
        
        // сброс игры
        function resetGame() {
            // очистить препятствия и искры
            obstacles.forEach(obs => scene.remove(obs));
            sparks.forEach(sp => scene.remove(sp));
            obstacles = [];
            sparks = [];
            score = 0;
            document.getElementById('scoreValue').innerText = "0";
            playerPosY = 0;
            playerVelY = 0;
            playerCube.position.y = 0;
            frameCounter = 0;
            lastSpawnFrame = 0;
            gameActive = true;
            document.getElementById('gameOverPanel').style.display = 'none';
            document.getElementById('startPanel').style.display = 'none';
            // добавим начальные объекты
            for(let i = 0; i < 2; i++) {
                let obs = createObstaclePair(4.5 + i * 3.2);
                obstacles.push(obs);
                // иногда добавляем искру вместе с препятствием
                if(Math.random() > 0.6) {
                    let sparkY = -1 + Math.random() * 3;
                    let sparkX = 4.5 + i * 3.2 + 0.5;
                    let sparkObj = createSpark(sparkX, sparkY);
                    sparks.push(sparkObj);
                }
            }
            // дополнительная искра в начале
            let starterSpark = createSpark(2.5, 0.5);
            sparks.push(starterSpark);
        }
        
        // обновление логики игры
        function updateGame() {
            if (!gameActive) return;
            
            // 1) Физика игрока
            playerVelY += GRAVITY;
            playerPosY += playerVelY;
            if (playerPosY > CEILING_Y) { playerPosY = CEILING_Y; playerVelY = 0; }
            if (playerPosY < GROUND_Y) { playerPosY = GROUND_Y; playerVelY = 0; }
            playerCube.position.y = playerPosY;
            
            // небольшое вращение кубика в полёте
            playerCube.rotation.x = playerVelY * 1.2;
            playerCube.rotation.z = playerVelY * 0.8;
            
            // 2) Движение препятствий и искр влево
            for (let i = 0; i < obstacles.length; i++) {
                obstacles[i].position.x -= SCROLL_SPEED;
            }
            for (let i = 0; i < sparks.length; i++) {
                sparks[i].position.x -= SCROLL_SPEED;
                // анимация вращения искры
                sparks[i].children[0].rotation.y += 0.05;
                sparks[i].children[1].rotation.x += 0.03;
            }
            
            // удаление вышедших за экран объектов
            obstacles = obstacles.filter(obs => {
                if (obs.position.x < -3.5) {
                    scene.remove(obs);
                    return false;
                }
                return true;
            });
            sparks = sparks.filter(sp => {
                if (sp.position.x < -3.5) {
                    scene.remove(sp);
                    return false;
                }
                return true;
            });
            
            // 3) Спавн новых препятствий
            if (frameCounter - lastSpawnFrame > spawnGap) {
                lastSpawnFrame = frameCounter;
                let newObs = createObstaclePair(4.8);
                obstacles.push(newObs);
                // с шансом 65% добавить искру в районе препятствия
                if (Math.random() < 0.65) {
                    let sparkY = -1.2 + Math.random() * 3.2;
                    let newSpark = createSpark(4.8 + 0.5, sparkY);
                    sparks.push(newSpark);
                }
                // иногда двойная искра
                if (Math.random() < 0.3) {
                    let sparkY2 = -0.8 + Math.random() * 2.5;
                    let extraSpark = createSpark(4.8 + 0.2, sparkY2);
                    sparks.push(extraSpark);
                }
            }
            
            // 4) КОЛЛИЗИИ с трубами и сбор искр
            const playerBox = new THREE.Box3().setFromObject(playerCube);
            // столкновения с трубами
            for (let obs of obstacles) {
                const obsBox = new THREE.Box3().setFromObject(obs);
                if (playerBox.intersectsBox(obsBox)) {
                    gameActive = false;
                    endGame();
                    return;
                }
                // проверка пролета мимо для увеличения счёта? но счет за искры, не за трубы
                if (!obs.userData.passed && obs.position.x < playerCube.position.x - 0.4) {
                    obs.userData.passed = true;
                    // можно бонусное очко за преодоление, но мы даем только за искры. оставим атмосферу.
                }
            }
            
            // сбор искр (увеличение счета)
            for (let i=0; i<sparks.length; i++) {
                const sparkBox = new THREE.Box3().setFromObject(sparks[i]);
                if (playerBox.intersectsBox(sparkBox) && !sparks[i].userData.collected) {
                    sparks[i].userData.collected = true;
                    score++;
                    document.getElementById('scoreValue').innerText = score;
                    // визуальный эффект: вспышка и удаление
                    scene.remove(sparks[i]);
                    sparks.splice(i,1);
                    i--;
                    // небольшое увеличение скорости динамики
                    fireGlow.intensity = 1.4;
                    setTimeout(() => { if(gameActive) fireGlow.intensity = 0.9; }, 150);
                }
            }
            
            frameCounter++;
        }
        
        function endGame() {
            gameActive = false;
            document.getElementById('finalScore').innerText = score;
            document.getElementById('gameOverPanel').style.display = 'flex';
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('fireCubeBest', bestScore);
                document.getElementById('bestValue').innerText = bestScore;
            }
        }
        
        function jump() {
            if (!gameActive) return;
            playerVelY = JUMP_FORCE;
            // звукоподражание визуально - вспышка углов
            cornerLights.forEach(l => { l.intensity = 1.2; setTimeout(() => { if(gameActive) l.intensity = 0.7; }, 200); });
            playerCube.position.y += 0.05;
        }
        
        // --- Управление ---
        window.addEventListener('click', () => { if(gameActive) jump(); });
        window.addEventListener('keydown', (e) => { if(e.code === 'Space' && gameActive) { e.preventDefault(); jump(); } });
        
        // Кнопки старта и рестарта
        document.getElementById('startBtn').addEventListener('click', () => {
            resetGame();
        });
        document.getElementById('restartBtn').addEventListener('click', () => {
            resetGame();
        });
        
        // --- Анимация дыма и окружения ---
        let time = 0;
        function animateEnvironment() {
            time += 0.02;
            // двигаем дым медленно
            smokeSys.rotation.y += 0.003;
            smokeSys.rotation.x = Math.sin(time * 0.2) * 0.1;
            // пульсация углов кубика
            cornerLights.forEach((l, idx) => {
                const intensity = 0.6 + Math.sin(time * 5 + idx) * 0.3;
                l.intensity = intensity;
            });
            // мерцание общего света
            fireGlow.intensity = 0.8 + Math.sin(time * 6) * 0.2;
        }
        
        // --- АНИМАЦИОННЫЙ ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            if (gameActive) {
                updateGame();
            }
            animateEnvironment();
            // синхронизация камеры с кубиком по Y
            const targetY = playerCube.position.y * 0.2;
            camera.position.y += (targetY - camera.position.y) * 0.08;
            camera.lookAt(0, playerCube.position.y * 0.6, 0);
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        // начальное состояние: меню
        gameActive = false;
        playerCube.position.y = 0;
        playerPosY = 0;
        animate();
        
        // небольшие декоративные искры в фоне
        const starField = new THREE.Points(new THREE.BufferGeometry(), new THREE.PointsMaterial({ color: 0xffaa77, size: 0.04 }));
        const starCount = 800;
        const starPos = new Float32Array(starCount * 3);
        for(let i=0;i<starCount;i++) {
            starPos[i*3] = (Math.random() - 0.5) * 200;
            starPos[i*3+1] = (Math.random() - 0.5) * 30;
            starPos[i*3+2] = (Math.random() - 0.5) * 50 - 30;
        }
        starField.geometry.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        scene.add(starField);
        
        // начальный показ стартовой панели
        document.getElementById('startPanel').style.display = 'flex';
        document.getElementById('gameOverPanel').style.display = 'none';
        
        // инструкция: отключить контекстное меню
        window.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
